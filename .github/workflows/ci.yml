name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r project/backend/requirements.txt
          pip install pytest
          
      - name: Run Backend Tests
        run: |
          # If tests exist, run them. For now, just check syntax.
          python -m py_compile project/backend/main.py

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"
          
      - name: Install dependencies
        working-directory: project/frontend
        run: npm ci
        
      - name: Build
        working-directory: project/frontend
        run: npm run build
